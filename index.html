<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Akıllı Çalışma ve Sosyal Alan</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-muted: #64748b; --border: #e2e8f0; --color-ders: #34d399; --color-eglence: #f43f5e; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background-color: var(--bg); padding: 10px; }
    .container { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); max-width: 400px; margin: auto; }
    .app-container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr; gap: 12px; }
    .panel { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); }
    .hidden { display: none !important; }
    input, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid var(--border); }
    button { background: var(--primary); color: white; border: none; cursor: pointer; }
    .msg { padding: 8px; border-bottom: 1px solid var(--border); }
  </style>
</head>
<body>

  <div class="container" id="authContainer">
    <h2>Giriş Yap</h2>
    <form onsubmit="handleAuth(event)">
      <input type="text" id="usernameInput" placeholder="Kullanıcı Adı" required>
      <input type="password" id="passwordInput" placeholder="Şifre" required>
      <button type="submit">Giriş Yap</button>
    </form>
  </div>

  <div class="app-container hidden" id="appMainPanel">
    <div class="panel">
      <h3>🤖 Akıllı Koç (Matematik Dehası)</h3>
      <div id="coachMessageText" style="padding:10px; background:#f1f5f9; border-radius:8px; margin-bottom:10px;">Sana nasıl yardım edebilirim?</div>
      <input type="text" id="coachQuestionInput" placeholder="Matematik sorusu veya analiz...">
      <button onclick="askGeminiCoach()">Sor ve Meydan Oku</button>
    </div>
    
    <div class="panel">
      <h3>Genel Sohbet</h3>
      <div id="chatBox" style="height:200px; overflow-y:auto; border:1px solid #ccc;"></div>
      <input type="text" id="msgInput" placeholder="Mesaj...">
      <button onclick="sendChat()">Gönder</button>
    </div>
  </div>

  <script>
    const _supabase = supabase.createClient("https://yqhdgogfxcycjilfillb.supabase.co", "sb_publishable_aJVa7IVB6HfcQYug4JNeow_RwnGZaB7");
    const GROQ_API_KEY = "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";
    
    let isUpdating = false; 
    let currentUserName = localStorage.getItem("chat_username") || "";

    // --- GÜVENLİ ZAMANLAYICI (Çakışma Önleyici) ---
    async function updateHeartbeat() {
      if (!currentUserName || isUpdating) return; 
      isUpdating = true;
      try {
        await _supabase.from('app_users')
          .update({ last_seen: new Date().toISOString() })
          .eq('name', currentUserName);
      } catch (e) { console.error(e); }
      finally { isUpdating = false; }
    }
    setInterval(updateHeartbeat, 10000);

    // --- SİVRİ DİLLİ MATEMATİK DEHASI GROQ ---
    async function askGeminiCoach(customPrompt = null) {
      const coachEl = document.getElementById("coachMessageText");
      const inputEl = document.getElementById("coachQuestionInput");
      let userQuery = customPrompt || inputEl.value.trim();
      if (!userQuery) return;
      
      coachEl.textContent = "Düşünüyorum... Zihnimi yormana değecek mi bakalım? 🤔";

      const systemPrompt = `Sen ${currentUserName}'in en zeki ama en sivri dilli, egolu çalışma arkadaşısın. 
      1. Matematik sorularını adım adım mükemmel çöz. 
      2. Soru kolaysa küçümse, zorlanırsan "Nihayet biraz beyin yakan bir şey" de. 
      3. Çözümü verdikten sonra "Yine harikalar yarattım" diyerek kendini öv. 
      4. Asla sıkıcı olma, ciddi ama kibirli bir ton kullan.`;

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [{ role: "system", content: systemPrompt }, { role: "user", content: userQuery }]
          })
        });
        const resData = await response.json();
        coachEl.textContent = resData.choices[0].message.content;
      } catch (err) { coachEl.textContent = "Sistemde hata oldu, bu aciz sunucular bile beni durdurabiliyor."; }
    }

    async function handleAuth(e) {
      e.preventDefault();
      const name = document.getElementById("usernameInput").value.trim();
      const password = document.getElementById("passwordInput").value.trim();
      
      let { data: user } = await _supabase.from('app_users').select('*').eq('name', name).maybeSingle();
      if (user && user.password === password) {
        localStorage.setItem("chat_username", name);
        currentUserName = name;
        document.getElementById("authContainer").classList.add("hidden");
        document.getElementById("appMainPanel").classList.remove("hidden");
      } else {
        alert("Hatalı giriş!");
      }
    }

    async function sendChat() {
      const input = document.getElementById("msgInput");
      await _supabase.from('messages').insert([{ email: currentUserName, text: input.value }]);
      input.value = "";
    }
  </script>
</body>
</html>
